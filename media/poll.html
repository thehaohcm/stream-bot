<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Poll Overlay</title>
    <!-- Use specific version of Tailwind as requested per web dev guidelines. Tailwind 3.4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            /* Phông nền trong suốt để dễ dàng chèn vào OBS */
            background-color: transparent;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar-1 {
            background: linear-gradient(90deg, #10B981 0%, #34D399 100%);
        }

        .progress-bar-2 {
            background: linear-gradient(90deg, #EF4444 0%, #F87171 100%);
        }

        .pulse-anim {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }
    </style>
</head>

<body class="w-[1280px] h-[720px] flex items-center justify-center bg-transparent relative">

    <div
        class="glass-panel w-full max-w-2xl mx-auto rounded-3xl p-10 shadow-[0_0_40px_rgba(0,0,0,0.5)] transform translate-y-4">
        <div class="flex items-center space-x-4 mb-8">
            <div class="w-3 h-3 rounded-full bg-red-500 pulse-anim"></div>
            <h1 class="text-3xl font-bold text-white uppercase tracking-wider">Khảo Sát Khán Giả</h1>
        </div>

        <h2
            class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-amber-500 mb-10 leading-tight">
            Thị trường sẽ có diễn biến thế nào trong tuần tới?
        </h2>

        <div class="space-y-8">
            <!-- Tùy chọn 1 -->
            <div class="relative">
                <div class="flex justify-between text-white text-xl font-semibold mb-3">
                    <span class="flex items-center"><span
                            class="bg-gray-700 text-white rounded-md w-8 h-8 flex items-center justify-center mr-3 shadow-inner">1</span>
                        Tăng Trưởng Lạc Quan (Bull)</span>
                    <span id="pct-1">50%</span>
                </div>
                <div class="w-full h-8 bg-gray-800 rounded-full overflow-hidden shadow-inner relative">
                    <div id="bar-1" class="h-full progress-bar-1 transition-all duration-1000 ease-out w-1/2"></div>
                </div>
            </div>

            <!-- Tùy chọn 2 -->
            <div class="relative">
                <div class="flex justify-between text-white text-xl font-semibold mb-3">
                    <span class="flex items-center"><span
                            class="bg-gray-700 text-white rounded-md w-8 h-8 flex items-center justify-center mr-3 shadow-inner">2</span>
                        Điều Chỉnh Bi Quan (Bear)</span>
                    <span id="pct-2">50%</span>
                </div>
                <div class="w-full h-8 bg-gray-800 rounded-full overflow-hidden shadow-inner relative">
                    <div id="bar-2" class="h-full progress-bar-2 transition-all duration-1000 ease-out w-1/2"></div>
                </div>
            </div>
        </div>

        <div class="mt-10 text-center">
            <p class="text-gray-400 text-lg">Gõ <b class="text-white">1</b> hoặc <b class="text-white">2</b> vào Live
                Chat để bình chọn.</p>
            <p class="text-gray-500 text-sm mt-2">Tổng số lượt bình chọn: <span id="total-votes"
                    class="text-gray-300 font-bold">0</span></p>
        </div>
    </div>

    <script>
        async function fetchPollData() {
            try {
                // Thêm timestamp để bypass cache trình duyệt
                const response = await fetch(`../poll_data.json?t=${new Date().getTime()}`);
                if (!response.ok) return;

                const data = await response.json();

                const votes1 = data["1"] || 0;
                const votes2 = data["2"] || 0;
                const total = data["total"] || 0;

                let pct1 = 0, pct2 = 0;
                if (total > 0) {
                    pct1 = Math.round((votes1 / total) * 100);
                    pct2 = 100 - pct1;
                }

                // Cập nhật UI
                document.getElementById('pct-1').innerText = `${pct1}%`;
                document.getElementById('bar-1').style.width = `${pct1}%`;

                document.getElementById('pct-2').innerText = `${pct2}%`;
                document.getElementById('bar-2').style.width = `${pct2}%`;

                document.getElementById('total-votes').innerText = total.toLocaleString('vi-VN');

            } catch (err) {
                console.error("Lỗi lấy dữ liệu poll:", err);
            }
        }

        // Lặp nội dung cập nhật mỗi 1s
        setInterval(fetchPollData, 1000);
        // Chạy lần đầu ngay lập tức
        fetchPollData();
    </script>
</body>

</html>
